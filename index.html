<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" crossorigin="anonymous"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    #scale-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      display: inline-block;
      transform-origin: top left;
    }
    #myCanvas {
      border: 1px solid #eee;
      background-color: #fafafa;
      border-radius: 4px;
      /* 16:9の比率を保ったままレスポンシブに対応 */
      width: 100%;
      max-width: 800px;
      height: auto;
      aspect-ratio: 16 / 9;
    }
    #btn_draw, #btn_domain, #btn_coord, #btn_square, #btn_maxmin {
      margin-right: 5px;
      margin-bottom: 5px;
    }
    .app-title {
      margin-top: 0;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #337ab7;
      font-weight: bold;
    }
    /* 分数表示を整えるためのCSSクラス */
    .fraction {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      vertical-align: middle;
      font-size: 85%;
      line-height: 1.1;
      margin: 0 2px;
    }
    .fraction .num {
      padding-bottom: 1px;
    }
    .fraction .den {
      border-top: 1px solid currentColor;
      padding-top: 1px;
    }
  </style>
  <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
</head>

<body>
<div id="scale-wrapper">
<div class="container" style="margin-top: 30px; width: 1300px;">
  <div class="row">

    <!-- 左側：入力フォームと計算結果 -->
    <div class="col-md-4 col-sm-12">
      <h3 class="app-title text-primary">2次関数の最大値・最小値</h3>

      <div style="margin-bottom: 20px;">
        <p style="font-size: large;">y = ax<sup>2</sup> + bx + c</p>
      </div>

      <div style="margin-bottom: 15px;">
        a : <input type="text" id="input_a" value="" size="3">
        b : <input type="text" id="input_b" value="" size="3">
        c : <input type="text" id="input_c" value="" size="3">
      </div>

      <div style="margin-bottom: 20px; padding: 10px; background-color: #f9f9f9; border-radius: 4px;">
        <p><strong>x の変域（空欄の場合は制限なし）:</strong></p>
        <input type="text" id="domain_min" value="" size="3"> ≦ x ≦
        <input type="text" id="domain_max" value="" size="3">
      </div>

      <div style="margin-bottom: 30px;">
        <button id="btn_square" class="btn btn-success">平方完成</button>
        <button id="btn_draw" class="btn btn-primary">グラフを表示</button>
        <button id="btn_domain" class="btn btn-warning">変域を表示</button>
        <button id="btn_maxmin" class="btn btn-danger">最大最小</button>
        <button id="btn_coord" class="btn btn-info">座標を表示</button>
      </div>

      <div class="panel panel-info">
        <div class="panel-heading"><h3 class="panel-title">関数の分析結果</h3></div>
        <div class="panel-body" id="math_result" style="font-size: 1.1em; line-height: 1.6;">
          <div id="result_square">数値を入力して「平方完成」または「最大最小」ボタンを押してください。</div>
          <div id="result_maxmin"></div>
        </div>
      </div>
    </div>

    <!-- 右側：Canvas (16:9に合わせてエリアを拡大) -->
    <div class="col-md-8 col-sm-12 text-center">
      <!-- width 800, height 450 で 16:9 の比率に設定 -->
      <canvas id="myCanvas" width="800" height="450"></canvas>
    </div>

  </div>
</div>
</div>

<script>
  // ==========================================
  // 画面(アドインの表示領域)いっぱいに、配置はそのまま拡大表示する
  // ==========================================
  (function () {
    var wrapper = document.getElementById('scale-wrapper');

    function fitToWindow() {
      wrapper.style.transform = 'none';
      var baseWidth = wrapper.offsetWidth;
      var baseHeight = wrapper.offsetHeight;
      if (!baseWidth || !baseHeight) return;

      var scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight);
      wrapper.style.transform = 'scale(' + scale + ')';
      wrapper.style.left = ((window.innerWidth - baseWidth * scale) / 2) + 'px';
      wrapper.style.top = ((window.innerHeight - baseHeight * scale) / 2) + 'px';
    }

    window.addEventListener('load', fitToWindow);
    window.addEventListener('resize', fitToWindow);

    if (window.ResizeObserver) {
      new ResizeObserver(fitToWindow).observe(wrapper);
    }
  })();

  window.addEventListener("load", init);

  function init() {
    var stage = new createjs.Stage("myCanvas");

    var canvasWidth = document.getElementById("myCanvas").width;
    var canvasHeight = document.getElementById("myCanvas").height;
    var startX = canvasWidth / 2;
    var startY = canvasHeight / 2;
    var scale = 25;

    // --- 背景のグリッド描画 ---
    var horizon_back = new createjs.Shape();
    horizon_back.graphics.beginStroke("#CCCCCC");
    stage.addChild(horizon_back);

    var vertical_back = new createjs.Shape();
    vertical_back.graphics.beginStroke("#CCCCCC");
    stage.addChild(vertical_back);

    // 画面全体を覆うようにグリッドの最大値を計算
    var max_scale_x = Math.ceil(startX / scale);
    var max_scale_y = Math.ceil(startY / scale);

    // 横線（Y軸方向への繰り返し）
    for (var i = -max_scale_y; i <= max_scale_y; i++) {
      horizon_back.graphics.moveTo(0, startY + (i * scale))
              .lineTo(canvasWidth, startY + (i * scale));
    }
    // 縦線（X軸方向への繰り返し）
    for (var i = -max_scale_x; i <= max_scale_x; i++) {
      vertical_back.graphics.moveTo(startX + (i * scale), 0)
              .lineTo(startX + (i * scale), canvasHeight);
    }

    var horizon_line = new createjs.Shape();
    horizon_line.graphics.beginStroke("#000000");
    horizon_line.graphics.moveTo(0, startY).lineTo(canvasWidth, startY);
    stage.addChild(horizon_line);

    var vertical_line = new createjs.Shape();
    vertical_line.graphics.beginStroke("#000000");
    vertical_line.graphics.moveTo(startX, 0).lineTo(startX, canvasHeight);
    stage.addChild(vertical_line);

    var bg_domain_shape = new createjs.Shape();
    stage.addChild(bg_domain_shape);

    var label_x = new createjs.Text("x", "20px Arial", "#000000");
    label_x.x = canvasWidth - 20;
    label_x.y = startY + 5;
    stage.addChild(label_x);

    var label_y = new createjs.Text("y", "20px Arial", "#000000");
    label_y.x = startX + 8;
    label_y.y = 5;
    stage.addChild(label_y);

    var label_zero = new createjs.Text("0", "20px Arial", "#000000");
    label_zero.x = startX - 18;
    label_zero.y = startY + 5;
    stage.addChild(label_zero);

    stage.update();

    var graph_line_base = new createjs.Shape();
    var graph_line_domain = new createjs.Shape();
    var graph_dots = new createjs.Shape();
    var graph_labels = new createjs.Container();

    // ==========================================
    // 小数を分数（近似値）に変換する関数
    // ==========================================
    function floatToFraction(x, tolerance) {
      if (x === 0) return {num: 0, den: 1};
      if (x < 0) {
        var res = floatToFraction(-x, tolerance);
        return {num: -res.num, den: res.den};
      }
      tolerance = tolerance || 1.0E-6;
      var h1 = 1, h2 = 0, k1 = 0, k2 = 1;
      var b = x;
      do {
        var a = Math.floor(b);
        var aux = h1; h1 = a * h1 + h2; h2 = aux;
        aux = k1; k1 = a * k1 + k2; k2 = aux;
        b = 1 / (b - a);
      } while (Math.abs(x - h1 / k1) > x * tolerance);
      return {num: h1, den: k1};
    }

    // Canvas用のテキスト用分数フォーマット（例: "3/2"）
    function toFractionString(x) {
      if (Math.abs(x) < 1e-10) return "0";
      if (Math.abs(Math.round(x) - x) < 1e-10) return Math.round(x).toString();

      var frac = floatToFraction(x, 1e-6);
      if (frac.den === 1) return frac.num.toString();

      return frac.num + "/" + frac.den;
    }

    // HTML用のリッチな分数フォーマット
    function toFractionHTML(x) {
      if (Math.abs(x) < 1e-10) return "0";
      if (Math.abs(Math.round(x) - x) < 1e-10) return Math.round(x).toString();

      var frac = floatToFraction(x, 1e-6);
      var sign = frac.num < 0 ? "-" : "";
      var num = Math.abs(frac.num);
      var den = frac.den;

      if (den === 1) return sign + num.toString();

      return sign + "<span class='fraction'><span class='num'>" + num + "</span><span class='den'>" + den + "</span></span>";
    }

    function round2(num) {
      return Math.round(num * 100) / 100;
    }

    // ==========================================
    // グラフ描画関数
    // ==========================================
    function drawGraph(drawMode) {
      var useDomain = (drawMode >= 1);
      var showCoords = (drawMode === 2);

      var a = parseFloat(document.getElementById("input_a").value) || 0;
      var b = parseFloat(document.getElementById("input_b").value) || 0;
      var c = parseFloat(document.getElementById("input_c").value) || 0;

      var minVal = document.getElementById("domain_min").value;
      var maxVal = document.getElementById("domain_max").value;
      var xMin = minVal === "" ? -Infinity : parseFloat(minVal);
      var xMax = maxVal === "" ? Infinity : parseFloat(maxVal);

      bg_domain_shape.graphics.clear();
      stage.removeChild(graph_line_base, graph_line_domain, graph_dots, graph_labels);

      graph_line_base = new createjs.Shape();
      graph_line_domain = new createjs.Shape();
      graph_dots = new createjs.Shape();
      graph_labels = new createjs.Container();

      if (c !== 0) {
        var yIntTxt = new createjs.Text(toFractionString(c), "20px Arial", "#000000");
        yIntTxt.x = startX + 8;
        yIntTxt.y = startY - (c * scale) + 5;
        graph_labels.addChild(yIntTxt);
      }

      if (!useDomain) {
        graph_line_base.graphics.beginStroke("#FF0000").setStrokeStyle(2);

        var isFirst = true;
        // 画面の左端から右端まで描画する
        for (var px = 0; px <= canvasWidth; px++) {
          var mathX = (px - startX) / scale;
          var mathY = (a * mathX * mathX) + (b * mathX) + c;
          var py = startY - (mathY * scale);

          if (isFirst) {
            graph_line_base.graphics.moveTo(px, py);
            isFirst = false;
          } else {
            graph_line_base.graphics.lineTo(px, py);
          }
        }
        stage.addChild(graph_line_base);

      } else {
        var visPxMin = minVal === "" ? 0 : startX + xMin * scale;
        var visPxMax = maxVal === "" ? canvasWidth : startX + xMax * scale;

        bg_domain_shape.graphics.beginFill("rgba(135, 206, 235, 0.2)")
                .drawRect(visPxMin, 0, visPxMax - visPxMin, canvasHeight);
        bg_domain_shape.graphics.beginStroke("#6495ED").setStrokeStyle(1);
        if (minVal !== "") bg_domain_shape.graphics.moveTo(visPxMin, 0).lineTo(visPxMin, canvasHeight);
        if (maxVal !== "") bg_domain_shape.graphics.moveTo(visPxMax, 0).lineTo(visPxMax, canvasHeight);

        graph_line_base.graphics.beginStroke("#FF0000").setStrokeStyle(1).setStrokeDash([5, 5], 0);
        graph_line_domain.graphics.beginStroke("#FF0000").setStrokeStyle(3);

        var isFirstBase = true;
        var isFirstDomain = true;

        for (var px = 0; px <= canvasWidth; px++) {
          var mathX = (px - startX) / scale;
          var mathY = (a * mathX * mathX) + (b * mathX) + c;
          var py = startY - (mathY * scale);

          if (isFirstBase) {
            graph_line_base.graphics.moveTo(px, py);
            isFirstBase = false;
          } else {
            graph_line_base.graphics.lineTo(px, py);
          }

          if (mathX >= xMin && mathX <= xMax) {
            if (isFirstDomain) {
              graph_line_domain.graphics.moveTo(px, py);
              isFirstDomain = false;
            } else {
              graph_line_domain.graphics.lineTo(px, py);
            }
          } else {
            isFirstDomain = true;
          }
        }

        if (minVal !== "") {
          var dotMathX1 = parseFloat(minVal);
          var dotMathY1 = (a * dotMathX1 * dotMathX1) + (b * dotMathX1) + c;
          graph_dots.graphics.beginFill("#FF0000").drawCircle(startX + dotMathX1 * scale, startY - dotMathY1 * scale, 4);
        }
        if (maxVal !== "") {
          var dotMathX2 = parseFloat(maxVal);
          var dotMathY2 = (a * dotMathX2 * dotMathX2) + (b * dotMathX2) + c;
          graph_dots.graphics.beginFill("#FF0000").drawCircle(startX + dotMathX2 * scale, startY - dotMathY2 * scale, 4);
        }

        stage.addChild(graph_line_base, graph_line_domain, graph_dots);
      }

      if (showCoords) {
        var coordMap = {};

        function addLabel(x, y, name) {
          var rx = round2(x);
          var ry = round2(y);
          var key = rx + "_" + ry;
          if (!coordMap[key]) coordMap[key] = { x: x, y: y, names: [] };
          if (!coordMap[key].names.includes(name)) {
            coordMap[key].names.push(name);
          }
        }

        var candidates = [];
        if (minVal !== "") candidates.push({x: xMin, y: (a*xMin*xMin + b*xMin + c)});
        if (maxVal !== "") candidates.push({x: xMax, y: (a*xMax*xMax + b*xMax + c)});

        if (a !== 0) {
          var vX = -b / (2 * a);
          var vY = c - (b * b) / (4 * a);
          addLabel(vX, vY, "頂点");

          if (vX >= xMin && vX <= xMax) {
            candidates.push({x: vX, y: vY});
          }
        }

        var maxCandidate = null;
        var minCandidate = null;

        if (candidates.length > 0) {
          maxCandidate = candidates.reduce(function(max, p) { return p.y > max.y ? p : max; }, candidates[0]);
          minCandidate = candidates.reduce(function(min, p) { return p.y < min.y ? p : min; }, candidates[0]);
        }

        if (a > 0) {
          if (minVal === "" || maxVal === "") maxCandidate = null;
        } else if (a < 0) {
          if (minVal === "" || maxVal === "") minCandidate = null;
        }

        if (maxCandidate) addLabel(maxCandidate.x, maxCandidate.y, "最大");
        if (minCandidate) addLabel(minCandidate.x, minCandidate.y, "最小");

        for (var key in coordMap) {
          var pt = coordMap[key];
          var textStr = pt.names.join("・") + " (" + toFractionString(pt.x) + ", " + toFractionString(pt.y) + ")";
          var px = startX + pt.x * scale;
          var py = startY - pt.y * scale;

          var pointDot = new createjs.Shape();
          pointDot.graphics.beginFill("#008000").drawCircle(px, py, 5);
          graph_labels.addChild(pointDot);

          var txtBg = new createjs.Text(textStr, "bold 18px Arial", "#FFFFFF");
          var txt = new createjs.Text(textStr, "bold 18px Arial", "#008000");
          txtBg.outline = 5;

          // Canvasの端にはみ出さないよう調整
          if (px > canvasWidth - 100) {
            txt.textAlign = "right"; txtBg.textAlign = "right";
            txt.x = px - 8; txtBg.x = px - 8;
          } else {
            txt.textAlign = "left"; txtBg.textAlign = "left";
            txt.x = px + 8; txtBg.x = px + 8;
          }

          if (py < 30) {
            txt.y = py + 12; txtBg.y = py + 12;
          } else {
            txt.y = py - 22; txtBg.y = py - 22;
          }

          graph_labels.addChild(txtBg, txt);
        }
      }

      stage.addChild(graph_labels);
      stage.update();
    }

    document.getElementById('btn_draw').addEventListener('click', function () { drawGraph(0); });
    document.getElementById('btn_domain').addEventListener('click', function () { drawGraph(1); });
    document.getElementById('btn_coord').addEventListener('click', function () { drawGraph(2); });

    function getSquareHtml(a, b, c) {
      if (a === 0) {
        return "<p>a = 0 のため、2次関数ではありません。</p>";
      }
      var p = -b / (2 * a);
      var q = c - (b * b) / (4 * a);

      var aStr = "";
      if (Math.abs(a - 1) < 1e-10) aStr = "";
      else if (Math.abs(a + 1) < 1e-10) aStr = "-";
      else aStr = toFractionHTML(a);

      var pStr = "";
      if (Math.abs(p) > 1e-10) {
        pStr = "(x " + (p > 0 ? "- " : "+ ") + toFractionHTML(Math.abs(p)) + ")<sup>2</sup>";
      } else {
        pStr = "x<sup>2</sup>";
      }

      var qStr = "";
      if (Math.abs(q) > 1e-10) {
        qStr = (q > 0 ? " + " : " - ") + toFractionHTML(Math.abs(q));
      }

      var equationStr = "y = " + aStr + pStr + qStr;

      var html = "<p><strong>平方完成：</strong> " + equationStr + "</p>";
      html += "<p><strong>頂点：</strong> (" + toFractionHTML(p) + ", " + toFractionHTML(q) + ")</p>";

      return html;
    }

    document.getElementById('btn_square').addEventListener('click', function () {
      var a = parseFloat(document.getElementById("input_a").value) || 0;
      var b = parseFloat(document.getElementById("input_b").value) || 0;
      var c = parseFloat(document.getElementById("input_c").value) || 0;

      document.getElementById("result_square").innerHTML = getSquareHtml(a, b, c);
      document.getElementById("result_maxmin").innerHTML = "";
    });

    document.getElementById('btn_maxmin').addEventListener('click', function () {
      var a = parseFloat(document.getElementById("input_a").value) || 0;
      var b = parseFloat(document.getElementById("input_b").value) || 0;
      var c = parseFloat(document.getElementById("input_c").value) || 0;

      var minValStr = document.getElementById("domain_min").value;
      var maxValStr = document.getElementById("domain_max").value;
      var xMin = minValStr === "" ? -Infinity : parseFloat(minValStr);
      var xMax = maxValStr === "" ? Infinity : parseFloat(maxValStr);

      var maxminHtml = "";

      if (a !== 0) {
        var p = -b / (2 * a);
        var q = c - (b * b) / (4 * a);

        var candidates = [];
        if (minValStr !== "") candidates.push({ x: xMin, y: (a * xMin * xMin) + (b * xMin) + c });
        if (maxValStr !== "") candidates.push({ x: xMax, y: (a * xMax * xMax) + (b * xMax) + c });
        if (p >= xMin && p <= xMax) {
          candidates.push({ x: p, y: q });
        }

        var maxInfo = null;
        var minInfo = null;

        if (candidates.length > 0) {
          maxInfo = candidates.reduce(function(max, pt) { return pt.y > max.y ? pt : max; }, candidates[0]);
          minInfo = candidates.reduce(function(min, pt) { return pt.y < min.y ? pt : min; }, candidates[0]);
        }

        if (a > 0) {
          if (minValStr === "" || maxValStr === "") maxInfo = null;
        } else if (a < 0) {
          if (minValStr === "" || maxValStr === "") minInfo = null;
        }

        maxminHtml += "<hr style='margin:15px 0; border-color:#d9edf7;'>";

        if (maxInfo) {
          maxminHtml += "<p class='text-danger'><strong>最大値：</strong> " + toFractionHTML(maxInfo.y) +
                  " <span style='font-size:0.9em;color:#555;'>（x = " + toFractionHTML(maxInfo.x) + " のとき）</span></p>";
        } else {
          maxminHtml += "<p><strong>最大値：</strong> なし</p>";
        }

        if (minInfo) {
          maxminHtml += "<p class='text-primary'><strong>最小値：</strong> " + toFractionHTML(minInfo.y) +
                  " <span style='font-size:0.9em;color:#555;'>（x = " + toFractionHTML(minInfo.x) + " のとき）</span></p>";
        } else {
          maxminHtml += "<p><strong>最小値：</strong> なし</p>";
        }
      }

      document.getElementById("result_square").innerHTML = getSquareHtml(a, b, c);
      document.getElementById("result_maxmin").innerHTML = maxminHtml;
    });
  }
</script>
</body>
</html>
